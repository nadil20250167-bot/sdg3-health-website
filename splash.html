<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Automatically redirects the user to the home page after 4 seconds. -->
  <meta http-equiv="refresh" content="4; url=home.html" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PULSE - Welcome</title>

  <style>

    :root {
      --c-primary: #0077c0;
      --c-primary-dark: #0b72b5;
      --c-primary-light: #4fb3e8;
      --c-accent: #ffffff;
      --c-bg-light: #f1f8f4;
      --c-overlay-top: rgba(11, 40, 66, 0.55);
      --c-overlay-bottom: rgba(4, 20, 34, 0.85);
      --font-main: 'Times New Roman', Times, serif;

      --radius-md: 14px;
      --radius-pill: 40px;

      --transition-fast: 0.3s ease;

      --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.3);
      --shadow-glow: 0 0 25px rgba(255, 255, 255, 0.35);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: var(--font-main);
      color: var(--c-bg-light);
      overflow: hidden;
    }

    /* Full-screen background image, scaled to fit, with a layered
       gradient overlay so text stays readable on any photo */
    .bg-overlay {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: url('images/splashscreen_photo.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      box-shadow: inset 0 0 0 2000px var(--c-overlay-top);
    }

    .bg-overlay::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 0%, var(--c-overlay-bottom) 100%);
    }

    .splash-container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    .site-title {
      font-size: clamp(2.6rem, 7vw, 4.2rem);
      background: linear-gradient(90deg, var(--c-accent), var(--c-primary-light), var(--c-accent));
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 0.02em;
      font-weight: bold;
    }

    .mission-statement {
      font-size: 1.15rem;
      max-width: 620px;
      line-height: 1.6;
      color: var(--c-bg-light);
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
    }

    
    .team-section {
      padding: 0.5rem 1rem;
    }

    .team-heading {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      margin-bottom: 1rem;
      font-weight: bold;
      color: var(--c-primary-light);
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
    }

    
    .team-list {
      list-style: none;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 0;
    }

    .team-list li {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 8rem;
    }

    /* Connecting line drawn behind the circles */
    .team-list li:not(:last-child)::after {
      content: '';
      position: absolute;
      top: 1.1rem;
      left: 60%;
      width: 90%;
      height: 1px;
      background: rgba(255, 255, 255, 0.4);
      z-index: 0;
    }

    .student-number {
      position: relative;
      z-index: 1;
      width: 2.2rem;
      height: 2.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      border: 1.5px solid var(--c-primary-light);
      color: var(--c-accent);
      font-size: 1rem;
      font-weight: bold;
      background: var(--c-primary-dark);
      transition: var(--transition-fast);
    }

    .team-list li:hover .student-number {
      background: var(--c-primary-light);
      color: var(--c-primary-dark);
      transform: scale(1.1);
    }

    .student-name {
      margin-top: 0.6rem;
      font-size: 0.92rem;
      font-weight: bold;
      line-height: 1.3;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
    }

   
    .loader-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
    }

    .loader-bar {
      width: min(300px, 70vw);
      height: 9px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: var(--radius-pill);
      overflow: hidden;
      box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.25);
    }

    .loader-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--c-primary-light), var(--c-accent));
      border-radius: var(--radius-pill);
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.7);
      animation: fillBar 4s linear forwards;
    }

    .countdown-text {
      font-size: 1rem;
      font-weight: bold;
    }

    .countdown-text span {
      font-size: 1.3rem;
      color: var(--c-primary-light);
    }

    .skip-btn {
      margin-top: 0.3rem;
      padding: 12px 32px;
      font-family: var(--font-main);
      font-weight: bold;
      font-size: 1rem;
      color: var(--c-primary-dark);
      background: var(--c-accent);
      border: none;
      border-radius: var(--radius-pill);
      cursor: pointer;
      box-shadow: var(--shadow-soft);
      transition: var(--transition-fast);
    }

    .skip-btn:hover {
      background: var(--c-primary);
      color: var(--c-accent);
      transform: translateY(-3px);
      box-shadow: var(--shadow-glow);
    }

    @keyframes fillBar {
      to { width: 100%; }
    }

    @media (max-width: 600px) {
      .team-list { flex-direction: column; align-items: center; }
      .site-title { font-size: 2.4rem; }
    }
  </style>
</head>
<body>

  <div class="bg-overlay"></div>

  <main class="splash-container">

    <h1 class="site-title">PULSE</h1>

    <p class="mission-statement">
      A small step today, a healthier tomorrow - through mindful daily choices,
      we support better health, calmer minds, and overall wellness.
    </p>

    <section class="team-section" aria-label="Group Members">
      <h2 class="team-heading">Our Team</h2>
      <ul class="team-list">
        <li>
          <span class="student-number">1</span>
          <span class="student-name">Nadil Athuraliya</span>
        </li>
        <li>
          <span class="student-number">2</span>
          <span class="student-name">Malki Vidunima</span>
        </li>
        <li>
          <span class="student-number">3</span>
          <span class="student-name">Nimsara Rajapakse</span>
        </li>
        <li>
          <span class="student-number">4</span>
          <span class="student-name">Thisath</span>
        </li>
      </ul>
    </section>

    <div class="loader-wrapper" role="group" aria-label="Loading indicator">
      <div class="loader-bar">
        <div class="loader-fill"></div>
      </div>
    </div>

    <p class="countdown-text" aria-live="polite">
      Entering site in <span id="timer">4</span>...
    </p>

    <button class="skip-btn" id="skipBtn" onclick="skipIntro()">
      Skip Intro &rarr;
    </button>

  </main>

  <script>
    // Countdown Timer (JavaScript) - updates the visible number every second
    let secondsLeft = 4;
    const timerEl = document.getElementById('timer');

    const tick = setInterval(() => {
      secondsLeft--;
      if (timerEl) timerEl.textContent = secondsLeft > 0 ? secondsLeft : 0;
      if (secondsLeft <= 0) clearInterval(tick);
    }, 1000);

    // Skip Intro: stops the countdown and jumps straight to the Home Page,
    // effectively cancelling the auto-redirect since we navigate away first
    function skipIntro() {
      clearInterval(tick);
      window.location.href = 'home.html';
    }
  </script>

</body>
</html>
